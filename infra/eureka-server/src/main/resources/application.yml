server:
  port: 8761

spring:
  application:
    name: eureka-server

  config:
    import: classpath:application-observability.yml

eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
