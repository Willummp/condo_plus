server:
  port: 8083

spring:
  application:
    name: portaria-service

  # Perfil ativo definido por variável de ambiente ou flag de startup
  # Não fixar 'dev' aqui — cada ambiente sobe com -Dspring.profiles.active=xxx

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gerencia o schema; JPA só valida
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: portaria
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: portaria
    default-schema: portaria

  data:
    redis:
      timeout: 2s
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: portaria-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.Map


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    kafka:
      enabled: false  # Kafka DOWN nao derruba o status geral do servico

# Circuit Breaker para chamadas ao condominio-service
resilience4j:
  circuitbreaker:
    instances:
      condominioService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      condominioService:
        timeout-duration: 3s

# Propriedades de domínio — lidas pelo PortariaProperties
condoplus:
  portaria:
    encomendas:
      curto-prazo-ttl-minutos: 120    # 2h para CURTO_PRAZO (iFood)
      medio-prazo-alerta-dias: 7
      longo-prazo-alerta-dias: 30
    expiracao-job:
      cron: "0 */5 * * * *"           # a cada 5 minutos em produção
  kafka:
    consumer:
      group-id: portaria-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    topics:
      credenciais-criadas: credenciais.criadas
      acessos-registrados: portaria.acessos
      encomendas-recebidas: portaria.encomendas.recebidas
      encomendas-retiradas: portaria.encomendas.retiradas

logging:
  level:
    root: INFO
    com.condoplus.portaria_service: DEBUG
    org.hibernate.SQL: WARN
    io.lettuce.core: WARN