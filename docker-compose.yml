name: condoplus

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: condoplus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: condoplus
      POSTGRES_USER: condominio_user
      POSTGRES_PASSWORD: condominio_password
    volumes:
      - condoplus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condominio_user -d condoplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cria o schema 'notificacao' no postgres antes de subir o notificacao-service
  postgres-init:
    image: postgres:16-alpine
    container_name: condoplus-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: condominio_password
    command: >
      psql -h postgres -U condominio_user -d condoplus
      -c "CREATE SCHEMA IF NOT EXISTS notificacao; GRANT ALL ON SCHEMA notificacao TO condominio_user;"
    restart: on-failure

  # ── MongoDB ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: condoplus-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - condoplus_mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft — sem Zookeeper) ────────────────────────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: condoplus-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - condoplus_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: condoplus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - condoplus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # MICROSSERVIÇOS
  # ═══════════════════════════════════════════════════════════════

  # ── Eureka Server (subir primeiro) ───────────────────────────────
  eureka:
    build:
      context: .
      dockerfile: infra/eureka-server/Dockerfile
    image: condoplus/eureka-server
    container_name: condoplus-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── IAM Service ───────────────────────────────────────────────────
  iam:
    build:
      context: .
      dockerfile: iam_service/Dockerfile
    image: condoplus/iam-service
    container_name: condoplus-iam
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/condoplus?currentSchema=iam
      IAM_DB_USER: condominio_user
      IAM_DB_PASSWORD: condominio_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ── Condominio Service ────────────────────────────────────────────
  condominio:
    build:
      context: .
      dockerfile: condominio_service/Dockerfile
    image: condoplus/condominio-service
    container_name: condoplus-condominio
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/condoplus?currentSchema=condominio
      CONDOMINIO_DB_USER: condominio_user
      CONDOMINIO_DB_PASSWORD: condominio_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
      kafka:
        condition: service_healthy
      iam:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ── Portaria Service ──────────────────────────────────────────────
  portaria:
    build:
      context: .
      dockerfile: portaria-service/Dockerfile
    image: condoplus/portaria-service
    container_name: condoplus-portaria
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/condoplus?currentSchema=portaria
      SPRING_DATASOURCE_USERNAME: condominio_user
      SPRING_DATASOURCE_PASSWORD: condominio_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:9092
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ── Notificacao Service ───────────────────────────────────────────
  notificacao:
    build:
      context: .
      dockerfile: notificacao-service/Dockerfile
    image: condoplus/notificacao-service
    container_name: condoplus-notificacao
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/condoplus?currentSchema=notificacao
      NOTIFICACAO_DB_USER: condominio_user
      NOTIFICACAO_DB_PASSWORD: condominio_password
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/condoplus?currentSchema=notificacao
      KAFKA_BOOTSTRAP: kafka:9092
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      eureka:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ── Auditoria Service ─────────────────────────────────────────────
  auditoria:
    build:
      context: .
      dockerfile: auditoria_service/Dockerfile
    image: condoplus/auditoria-service
    container_name: condoplus-auditoria
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      MONGO_URI: mongodb://mongo:27017/condoplus_auditoria
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_URL: http://eureka:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mongo:
        condition: service_healthy
      eureka:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ── API Gateway (subir por último) ────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: infra/api-gateway/Dockerfile
    image: condoplus/api-gateway
    container_name: condoplus-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      eureka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  zipkin:
    image: openzipkin/zipkin:3
    container_name: condoplus-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      # Armazenamento in-memory. Para persistir, trocar STORAGE_TYPE para 'elasticsearch'
      # ou 'cassandra' na Fase 4.
      STORAGE_TYPE: mem
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Prometheus (metrics scraper) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: condoplus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - condoplus_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Grafana (dashboards) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: condoplus-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - condoplus_grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy


volumes:
  condoplus_postgres_data:
  condoplus_mongo_data:
  condoplus_kafka_data:
  condoplus_redis_data:
  condoplus_prometheus_data:
  condoplus_grafana_data:

