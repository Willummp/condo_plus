name: Condo+ CI - Notificacao Service

on:
  push:
    paths:
      - 'notificacao-service/**'
      - 'pom.xml'
      - '.github/workflows/notificacao-service.yml'
  pull_request:
    paths:
      - 'notificacao-service/**'
      - 'pom.xml'
      - '.github/workflows/notificacao-service.yml'

jobs:
  test:
    name: Test Notificacao Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn package -pl notificacao-service -am -DskipTests

      - name: Unit Tests
        run: mvn test -pl notificacao-service -am

      - name: Integration Tests
        run: mvn verify -pl notificacao-service -am -DskipTests=false
