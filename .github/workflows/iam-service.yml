name: Condo+ CI — IAM Service

on:
  push:
    paths:
      - 'iam_service/**'
      - 'pom.xml'
      - '.github/workflows/iam-service.yml'
  pull_request:
    paths:
      - 'iam_service/**'
      - 'pom.xml'
      - '.github/workflows/iam-service.yml'

jobs:
  test:
    name: Test IAM Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Unit Tests (iam_service)
        run: mvn test -pl iam_service -am

      - name: Integration Tests (iam_service)
        run: mvn failsafe:integration-test failsafe:verify -pl iam_service
