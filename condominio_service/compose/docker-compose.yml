version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: condoplus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: condoplus
      POSTGRES_USER: condominio_user
      POSTGRES_PASSWORD: condominio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
