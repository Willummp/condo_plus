# Profile de desenvolvimento — ativa com: mvn spring-boot:run -Dspring.profiles.active=dev
# ou setar SPRING_PROFILES_ACTIVE=dev

logging:
  level:
    # Ver o SQL exato que o Spring Data JDBC está gerando (com bind parameters)
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE

# Circuit Breaker mais permissivo em dev para facilitar testes manuais
# (derrubamos o iam-service propositalmente e queremos que ele se recupere rápido)
resilience4j:
  circuitbreaker:
    instances:
      iamService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 2
        waitDurationInOpenState: 5s  # recupera em 5s em vez de 30s
