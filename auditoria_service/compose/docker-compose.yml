# docker-compose do auditoria-service.
# Sobe MongoDB e Kafka locais com persistencia em volumes nomeados.
# Imagens fixas em versao especifica para reprodutibilidade entre integrantes.
name: auditoria-service
services:
  mongo:
    image: mongo:7.0
    container_name: auditoria-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - auditoria_mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka em modo KRaft (sem Zookeeper), imagem oficial Apache.
  # E o "correio" por onde o auditoria escuta os eventos dos outros servicos.
  kafka:
    image: apache/kafka:3.7.1
    container_name: auditoria-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # Listeners: 9092 exposto para sua app (fora do Docker); 9093 interno do controlador.
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Configs minimas para no de um unico broker (dev)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - auditoria_kafka_data:/var/lib/kafka/data

volumes:
  auditoria_mongo_data:
  auditoria_kafka_data: